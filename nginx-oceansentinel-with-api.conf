server {
    server_name oceansentinelle.fr www.oceansentinelle.fr 76.13.43.3 _;

    root /opt/oceansentinel/frontend;
    index index.html;

    access_log /var/log/nginx/oceansentinel-access.log;
    error_log /var/log/nginx/oceansentinel-error.log;

    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    rewrite ^/(.*\.html)/$ /$1 permanent;

    # API REST Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' 'https://oceansentinelle.fr' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /favicon.ico {
        alias /opt/oceansentinel/frontend/assets/images/favicon.svg;
        expires 30d;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/oceansentinelle.fr-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oceansentinelle.fr-0002/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/h;

server {
    if ($host = www.oceansentinelle.fr) {
        return 301 https://$host$request_uri;
    }

    if ($host = oceansentinelle.fr) {
        return 301 https://$host$request_uri;
    }

    listen 80 default_server;
    server_name oceansentinelle.fr www.oceansentinelle.fr 76.13.43.3 _;
    return 404;
}
