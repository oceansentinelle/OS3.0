<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <title>Page introuvable - Ocean Sentinelle</title>
  <link rel="stylesheet" href="/assets/os_nav.css">
  <script src="/assets/os_nav.js" defer></script>
  <style>
    :root{--bg:#071B2E;--panel:#0D2A44;--line:#56B6E9;--text:#EAF4FF;--muted:#B8CBE0;--radius:8px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0,rgba(126,215,255,.18),transparent 34rem),linear-gradient(180deg,#071B2E,#06111e);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.6}
    .wrap{max-width:760px;margin:0 auto;padding:52px 20px}.card{background:linear-gradient(180deg,rgba(18,60,91,.72),rgba(13,42,68,.88));border:1px solid rgba(126,215,255,.2);border-radius:var(--radius);padding:20px}.muted{color:var(--muted)}.btn{display:inline-flex;background:linear-gradient(135deg,#56B6E9,#7ED7FF);color:#052033;padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div id="os-topnav"></div>
  <main class="wrap">
    <section class="card">
      <h1>Page introuvable</h1>
      <p class="muted">Cette route n'est pas publiee. Les routes publiques doivent etre explicites pour eviter toute confusion avec la page d'accueil.</p>
      <p class="muted">Ocean Sentinelle reste une surface de transparence publique : shadow mode, non decisionnel, aucune alerte operationnelle.</p>
      <p><a class="btn" href="/">Retour a l'accueil</a></p>
    </section>
  </main>
</body>
</html>
