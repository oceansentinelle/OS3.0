<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A3E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ocean wave -->
  <path d="M 10 50 Q 25 40, 40 50 T 70 50 T 100 50 L 100 100 L 10 100 Z" 
        fill="url(#oceanGradient)" opacity="0.8"/>
  
  <!-- Second wave -->
  <path d="M 10 60 Q 25 50, 40 60 T 70 60 T 100 60 L 100 100 L 10 100 Z" 
        fill="url(#oceanGradient)" opacity="0.6"/>
  
  <!-- Sentinel dot -->
  <circle cx="50" cy="35" r="8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="50" cy="35" r="4" fill="#0066CC"/>
</svg>
