# =====================================================
# PostgreSQL 16 + TimescaleDB - Configuration Optimisée
# =====================================================
# Infrastructure: VPS Hostinger 8GB RAM / 4 vCPU
# Projet: Ocean Sentinel - Station BARAG
# =====================================================

# =====================================================
# CONNEXIONS ET AUTHENTIFICATION
# =====================================================

listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# Authentification sécurisée
password_encryption = scram-sha-256

# =====================================================
# MÉMOIRE (Optimisé pour 8GB RAM)
# =====================================================

# Mémoire partagée (25% de la RAM totale)
shared_buffers = 2GB

# Cache effectif (50% de la RAM totale)
effective_cache_size = 4GB

# Mémoire de travail par opération
work_mem = 20MB
maintenance_work_mem = 512MB

# Mémoire pour les opérations de tri/hash
hash_mem_multiplier = 2.0

# =====================================================
# PARALLÉLISME (4 vCPU)
# =====================================================

max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Background workers pour TimescaleDB
timescaledb.max_background_workers = 8

# =====================================================
# WRITE-AHEAD LOG (WAL)
# =====================================================

wal_level = replica
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB

# Checkpoints
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
checkpoint_warning = 30s

# Archivage (désactivé par défaut)
archive_mode = off

# =====================================================
# OPTIMISATION DES REQUÊTES
# =====================================================

# Coût des opérations
random_page_cost = 1.1  # Pour SSD
effective_io_concurrency = 200  # Pour SSD
seq_page_cost = 1.0

# Planificateur
default_statistics_target = 100
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# JIT (Just-In-Time compilation)
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# =====================================================
# TIMESCALEDB SPÉCIFIQUE
# =====================================================

# Extension TimescaleDB
shared_preload_libraries = 'timescaledb'

# Optimisations TimescaleDB
timescaledb.max_background_workers = 8
timescaledb.last_tuned = '2026-04-16'
timescaledb.last_tuned_version = '0.15.0'

# Compression
timescaledb.compress_segmentby_max_num_segments = 100

# =====================================================
# LOGGING ET MONITORING
# =====================================================

# Niveau de log
log_min_duration_statement = 1000  # Log requêtes > 1s
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Destination des logs
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# Statistiques
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 2048

# =====================================================
# AUTOVACUUM (Crucial pour TimescaleDB)
# =====================================================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# Seuils d'autovacuum
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05

# Coûts d'autovacuum
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# =====================================================
# SÉCURITÉ
# =====================================================

# SSL (à activer en production)
ssl = off
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'

# Timeouts
statement_timeout = 0  # Pas de timeout par défaut
lock_timeout = 0
idle_in_transaction_session_timeout = 10min

# =====================================================
# LOCALE ET ENCODAGE
# =====================================================

lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# Timezone
timezone = 'UTC'

# =====================================================
# EXTENSIONS
# =====================================================

# Extensions à charger
# pg_stat_statements pour le monitoring des requêtes
shared_preload_libraries = 'timescaledb,pg_stat_statements'

# Configuration pg_stat_statements
pg_stat_statements.max = 10000
pg_stat_statements.track = all
