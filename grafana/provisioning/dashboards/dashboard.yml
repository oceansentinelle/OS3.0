# ============================================================================
# Ocean Sentinel V3.0 - Grafana Dashboard Provisioning
# ============================================================================

apiVersion: 1

providers:
  - name: 'Ocean Sentinel Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
