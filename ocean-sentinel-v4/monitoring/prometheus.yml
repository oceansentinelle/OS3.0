# Configuration Prometheus - Ocean Sentinel API Monitoring
# Golden Signals: Latency, Traffic, Errors, Saturation

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ocean-sentinel-prod'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Load rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # === Ocean Sentinel API Backend ===
  - job_name: 'ocean-sentinel-api'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # === Nginx Reverse Proxy ===
  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']
    metrics_path: '/metrics'

  # === Node Exporter (System Metrics) ===
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # === PostgreSQL (si utilisé) ===
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']

  # === Redis (si utilisé pour cache) ===
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # === Blackbox Exporter (External Probes) ===
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://oceansentinelle.fr/health
          - https://oceansentinelle.fr/api/v1/stations
          - https://oceansentinelle.fr/api/v1/meteo/arcachon
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
