server {
    listen 80;
    listen [::]:80;
    server_name oceansentinelle.fr www.oceansentinelle.fr;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oceansentinelle.fr www.oceansentinelle.fr;
    
    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/oceansentinelle.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oceansentinelle.fr/privkey.pem;
    
    # Root directory
    root /var/www/oceansentinelle;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # React Router - redirect all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Force cache reload (temporaire pour déploiement)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
