# Configuration Client HTTP Résilient - Ocean Sentinel API
# Conforme aux principes Zero Trust et Circuit Breaker Pattern

http_client:
  # Timeouts stricts (éviter épuisement threads)
  timeouts:
    connect_timeout_ms: 2000  # P99 attendu
    read_timeout_ms: 5000     # P99.9 attendu
    write_timeout_ms: 3000
  
  # Stratégie Retry avec Full Jitter Backoff
  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: exponential_full_jitter
    base_delay_ms: 100
    max_delay_ms: 10000
    retry_on_status_codes: [429, 500, 502, 503, 504]
    retry_budget_percent: 10  # Max 10% des requêtes peuvent être retries
  
  # Circuit Breaker (Coupe-circuit)
  circuit_breaker:
    enabled: true
    failure_threshold_percent: 50  # Ouvre si 50% échecs
    success_threshold: 5           # Ferme après 5 succès consécutifs
    timeout_ms: 10000              # Durée état OPEN
    half_open_max_calls: 3         # Appels test en HALF_OPEN
  
  # Connection Pooling
  connection_pool:
    max_connections: 50
    max_idle_connections: 10
    idle_timeout_ms: 30000
  
  # Headers par défaut
  default_headers:
    Accept: application/json
    User-Agent: OceanSentinel-Client/1.0.0
    X-Client-Version: "1.0.0"

# Observabilité (Golden Signals)
observability:
  logging:
    level: INFO
    format: json
    include_correlation_id: true
    exclude_sensitive_fields: []
  
  metrics:
    enabled: true
    namespace: ocean_sentinel_api
    golden_signals:
      - latency_p50
      - latency_p99
      - latency_p99_9
      - request_rate
      - error_rate_4xx
      - error_rate_5xx
  
  tracing:
    enabled: true
    propagation_format: w3c  # W3C Trace Context
    sample_rate: 0.1         # 10% des traces

# Gestion Configuration (Zero Trust)
secrets_management:
  provider: vault  # hashicorp_vault | aws_secrets_manager | env
  base_url_key: OCEAN_SENTINEL_BASE_URL
  rotation_enabled: false  # Pas de secrets actuellement

# Rate Limiting côté client (protection)
rate_limiting:
  enabled: true
  requests_per_second: 10
  burst_size: 20

# Cache (Graceful Degradation)
cache:
  enabled: true
  ttl_seconds: 300  # 5 minutes
  max_size_mb: 100
  strategy: lru  # Least Recently Used
  cacheable_endpoints:
    - /api/v1/stations
    - /api/v1/meteo/arcachon
  cache_on_error: true  # Retourner cache si API down
