<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient océan -->
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001d3d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0353a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0582ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a068;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond océan -->
  <rect width="1920" height="1080" fill="url(#ocean)"/>
  
  <!-- Banc de sable -->
  <ellipse cx="1200" cy="700" rx="600" ry="200" fill="url(#sand)" opacity="0.8"/>
  <ellipse cx="800" cy="500" rx="400" ry="150" fill="url(#sand)" opacity="0.7"/>
  
  <!-- Texte placeholder -->
  <text x="960" y="540" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" opacity="0.3">
    Bassin d'Arcachon - Image Placeholder
  </text>
  <text x="960" y="600" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.3">
    Remplacer par bassin-arcachon-hero.jpg
  </text>
</svg>
