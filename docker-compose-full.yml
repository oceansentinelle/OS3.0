version: "3.9"

# ============================================================================
# Ocean Sentinel V3.0 - Docker Compose Full Stack
# ============================================================================
#
# Services:
# - postgres: TimescaleDB
# - redis: Cache et files
# - minio: Stockage objets (raw payloads)
# - api: FastAPI backend
# - orchestrator: Planificateur jobs
# - ingest_worker: Worker ingestion
# - transform_worker: Worker transformation
# - alert_worker: Worker alertes
# - reprocess_worker: Worker reprocessing (profile ops)
#
# Usage:
#   docker compose -f docker-compose-full.yml build
#   docker compose -f docker-compose-full.yml up -d
#
# ============================================================================

x-common-env: &common-env
  env_file:
    - .env
  restart: unless-stopped
  networks:
    - ocean_net

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: os_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oceansentinel}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pipeline_tables.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-oceansentinel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *common-env

  redis:
    image: redis:7-alpine
    container_name: os_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *common-env

  minio:
    image: minio/minio:latest
    container_name: os_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?err}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 10
    <<: *common-env

  # ==========================================================================
  # Application
  # ==========================================================================

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_api
    command: uvicorn api.main:app --host ${APP_HOST:-127.0.0.1} --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app/api
      - ./workers:/app/workers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    <<: *common-env

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_orchestrator
    command: python -m workers.orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./workers:/app/workers
      - ./data:/app/data
      - ./data_drop:/app/data_drop
    <<: *common-env

  # ==========================================================================
  # Workers
  # ==========================================================================

  ingest_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_ingest_worker
    command: python -m workers.ingest_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./workers:/app/workers
      - ./data:/app/data
      - ./data_drop:/app/data_drop
    <<: *common-env

  transform_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_transform_worker
    command: python -m workers.transform_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./workers:/app/workers
    <<: *common-env

  alert_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_alert_worker
    command: python -m workers.alert_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./workers:/app/workers
      - ./alerts:/app/alerts
    <<: *common-env

  reprocess_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_reprocess_worker
    command: python -m workers.reprocess_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./workers:/app/workers
      - ./data:/app/data
    profiles: ["ops"]
    <<: *common-env

  # ==========================================================================
  # Monitoring (optionnel)
  # ==========================================================================

  grafana:
    image: grafana/grafana:latest
    container_name: os_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - postgres
    profiles: ["monitoring"]
    <<: *common-env

# ============================================================================
# Volumes
# ============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================

networks:
  ocean_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
