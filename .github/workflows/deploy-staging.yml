name: Deploy to Staging

on:
  workflow_dispatch:
  push:
    branches: [ develop ]

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          labels: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Pull and start staging image
            docker stop oceansentinelle-api-staging || true
            docker rm oceansentinelle-api-staging || true
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            docker run -d \
              --name oceansentinelle-api-staging \
              --restart unless-stopped \
              -p 8001:8000 \
              -e TEST_MODE=false \
              -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
              -e REDIS_URL=${{ secrets.STAGING_REDIS_URL }} \
              -e PROMETHEUS_URL=${{ secrets.PROMETHEUS_URL }} \
              -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: Health Check Staging
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1
