name: Ocean Sentinel API CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Sécurité et Linting
  security-and-linting:
    runs-on: ubuntu-latest
    name: Security & Linting
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
          
      - name: Lint with flake8
        run: |
          # Lint minimal pour éviter les erreurs de syntaxe
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          
      - name: Security scan with Bandit
        run: |
          # Scan sécurité avec exclusion des tests
          bandit -r backend/ -f json -o bandit-report.json || true
          bandit -r backend/ -f text

  # Job 2: Tests Contractuels
  contract-testing:
    runs-on: ubuntu-latest
    name: Contract Testing
    needs: security-and-linting
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Newman
        run: |
          npm install -g newman
          
      - name: Start API locally
        run: |
          cd backend
          # Démarrer l'API en arrière-plan avec TEST_MODE
          TEST_MODE=true python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > ../uvicorn.pid
          sleep 8
          
      - name: Verify API is responding
        run: |
          # Vérifier que l'API répond
          curl -f http://127.0.0.1:8000/health || exit 1
          curl -f http://127.0.0.1:8000/api/v1/stations || exit 1
          
      - name: Run Newman contract tests
        run: |
          # Exécuter les tests contractuels
          newman run tests/contract/ocean_sentinel_api.postman_collection.json \
            --env-var base_url=http://127.0.0.1:8000 \
            --color on \
            --reporters cli
          
      - name: Stop API locally
        if: always()
        run: |
          # Arrêter proprement l'API même en cas d'échec
          if [ -f ../uvicorn.pid ]; then
            kill $(cat ../uvicorn.pid) || true
            rm ../uvicorn.pid
          fi
          pkill -f "uvicorn main:app" || true
          pkill -f "python -m uvicorn" || true

  # Job 3: Déploiement Production
  deploy-to-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: contract-testing
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Déploiement sur le serveur de production
            cd /var/www/oceansentinel-api
            
            # Mettre à jour le code
            git pull origin main
            
            # Activer l'environnement virtuel
            source venv/bin/activate
            
            # Mettre à jour les dépendances
            # HYPOTHÈSE: Le serveur a la même structure que le dépôt
            # Si requirements.txt est à la racine sur le serveur:
            pip install -r requirements.txt
            # Si requirements.txt est dans backend/ sur le serveur:
            # pip install -r backend/requirements.txt
            
            # Vérifier la configuration
            python -c "from main import app; print('API import OK')"
            
            # Redémarrer le service systemd
            sudo systemctl restart oceansentinel-api
            
            # Vérifier le statut du service
            sudo systemctl status oceansentinel-api --no-pager | head -n 10
            
            # Vérifier que l'API répond
            curl -f http://127.0.0.1:8000/health || exit 1
            curl -f https://oceansentinelle.fr/api/v1/stations || exit 1
            
            echo "✅ Déploiement terminé avec succès"
