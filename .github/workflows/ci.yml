name: Ocean Sentinel CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - "security/**"
      - "fix/**"
      - "test/**"

jobs:
  quality-tests:
    name: Quality, Security Scan and Tests
    runs-on: ubuntu-latest

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f api/requirements.txt ]; then
            pip install -r api/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest flake8 bandit

      - name: Minimal Python lint
        run: |
          flake8 api tests --count --select=E9,F63,F7,F821 --show-source --statistics

      - name: Security scan with Bandit
        run: |
          if [ -d api ]; then
            bandit -r api -ll -ii
          else
            bandit -r . -ll -ii
          fi

      - name: Guard against sensitive patterns
        shell: bash
        run: |
          set -euo pipefail

          private_key_re="BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY"
          leaked_password="OceanSentinel2026SecurePassword"

          if git grep -nE "$private_key_re|$leaked_password" -- . ':!*.yml' ':!*.yaml'; then
            echo "::error::Potential sensitive pattern detected in tracked files"
            exit 1
          fi

          echo "No sensitive pattern detected in tracked files."

      - name: Run tests
        run: |
          if [ -f tests/test_data_structures.py ] && [ -f tests/test_api_route_contract.py ]; then
            pytest -q tests/test_data_structures.py tests/test_api_route_contract.py
          else
            pytest -q
          fi
