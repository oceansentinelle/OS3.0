name: Deploy Production

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set target variables
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "TARGET_HOST=${{ secrets.PRODUCTION_HOST }}" >> $GITHUB_ENV
            echo "TARGET_USER=${{ secrets.PRODUCTION_USER }}" >> $GITHUB_ENV
            echo "TARGET_SSH_KEY=${{ secrets.PRODUCTION_SSH_KEY }}" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "TARGET_HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_ENV
            echo "TARGET_USER=${{ secrets.STAGING_USER }}" >> $GITHUB_ENV
            echo "TARGET_SSH_KEY=${{ secrets.STAGING_SSH_KEY }}" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
          labels: ghcr.io/${{ github.repository }}

      - name: Deploy to target environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ env.TARGET_SSH_KEY }}
          script: |
            # Stop existing container
            docker stop oceansentinelle-api || true
            docker rm oceansentinelle-api || true
            
            # Pull and start new image
            docker pull ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
            docker run -d \
              --name oceansentinelle-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e TEST_MODE=false \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e PROMETHEUS_URL=${{ secrets.PROMETHEUS_URL }} \
              -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Health Check Deployment
        run: |
          sleep 15
          curl -f ${{ env.TARGET_HOST }}/health || exit 1

  rollback:
    name: Rollback Deployment
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ env.TARGET_SSH_KEY }}
          script: |
            # Get previous image tag
            PREVIOUS_TAG=$(docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.CreatedAt}}" | grep -v latest | sort -rk2 | head -1 | awk '{print $2}')
            
            # Stop current container
            docker stop oceansentinelle-api || true
            docker rm oceansentinelle-api || true
            
            # Deploy previous version
            docker run -d \
              --name oceansentinelle-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e TEST_MODE=false \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e PROMETHEUS_URL=${{ secrets.PROMETHEUS_URL }} \
              -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              ghcr.io/${{ github.repository }}:$PREVIOUS_TAG

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#alerts'
          text: |
            🚨 **ROLLBACK ALERT**
            Deployment to ${{ inputs.environment }} failed and was rolled back to previous version.
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
