<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#001a2e">
    <meta name="description" content="Dashboard SACS - Surveillance océanographique temps réel Bassin d'Arcachon">
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <title>Dashboard SACS - Ocean Sentinel</title>
    <style>
        /* ============================================================================
           OCEAN SENTINEL V3.2 - DESIGN SYSTEM ÉPURÉ
           Mobile-First | WCAG 2.2 AA | Production-Ready
           ============================================================================ */

        /* RESET */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* TOKENS */
        :root {
            /* Palette */
            --ocean-950: #001a2e;
            --ocean-900: #002642;
            --ocean-800: #003459;
            --ocean-700: #334155;
            
            --slate-100: #f1f5f9;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            
            /* Semantic */
            --critical: #ff0000;
            --critical-bg: #1a0000;
            --critical-text: #ff6666;
            --success: #10b981;
            --success-dark: #065f46;
            --warning: #f59e0b;
            --warning-dark: #7c2d12;
            --info: #38bdf8;
            
            /* Typography */
            --font-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --text-xs: 11px;
            --text-sm: 13px;
            --text-base: 16px;
            --text-lg: 18px;
            --text-xl: 24px;
            --text-2xl: 32px;
            
            /* Spacing */
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-6: 24px;
            --space-8: 32px;
            
            /* Touch */
            --touch-min: 48px;
            
            /* Radius */
            --radius: 12px;
            
            /* Safe areas */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* BASE */
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-base);
            font-size: var(--text-base);
            line-height: 1.5;
            color: var(--slate-100);
            background: var(--ocean-950);
            padding-bottom: calc(var(--safe-bottom) + 60px);
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(0, 26, 46, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--ocean-700);
            padding: var(--space-4);
            padding-top: calc(var(--safe-top) + var(--space-4));
        }

        .header__inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header__logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            text-decoration: none;
            color: var(--slate-100);
        }

        .header__logo-text {
            font-size: var(--text-lg);
            font-weight: 700;
        }

        /* ALERTES SACS STICKY */
        .alerts {
            position: sticky;
            top: calc(60px + var(--safe-top));
            z-index: 20;
            padding: var(--space-4);
            background: var(--ocean-950);
        }

        .alerts__container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .alert {
            display: flex;
            align-items: flex-start;
            gap: var(--space-4);
            padding: var(--space-4);
            background: linear-gradient(135deg, var(--critical-bg) 0%, #330000 100%);
            border: 3px solid var(--critical);
            border-radius: var(--radius);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: var(--critical); }
            50% { border-color: var(--critical-text); }
        }

        .alert__icon {
            font-size: var(--text-2xl);
            flex-shrink: 0;
        }

        .alert__content {
            flex: 1;
            min-width: 0;
        }

        .alert__header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
        }

        .alert__tag {
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--critical-text);
        }

        .alert__title {
            font-size: var(--text-lg);
            font-weight: 700;
            text-transform: uppercase;
        }

        .alert__value {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--critical-text);
            margin-bottom: var(--space-2);
        }

        .alert__meta {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
            font-size: var(--text-sm);
            color: var(--slate-300);
        }

        .alert__dismiss {
            width: var(--touch-min);
            height: var(--touch-min);
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: var(--slate-100);
            font-size: var(--text-xl);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* MAIN CONTENT */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-4);
        }

        .section {
            margin-bottom: var(--space-8);
        }

        .section__title {
            font-size: var(--text-xl);
            font-weight: 700;
            margin-bottom: var(--space-4);
            color: var(--info);
        }

        /* GRILLE STATIONS */
        .station-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-4);
        }

        @media (min-width: 640px) {
            .station-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .station-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* CARTE MÉTRIQUE */
        .metric {
            background: var(--ocean-900);
            border: 2px solid var(--ocean-700);
            border-left: 4px solid var(--success);
            border-radius: var(--radius);
            padding: var(--space-4);
            position: relative;
        }

        .metric--critical {
            border-left-color: var(--critical);
            background: linear-gradient(135deg, var(--ocean-900) 0%, #1a0a0a 100%);
        }

        .metric__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-3);
        }

        .metric__label {
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--slate-400);
        }

        .metric__value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: var(--space-2);
        }

        .metric--critical .metric__value {
            color: var(--critical-text);
        }

        .metric__unit {
            font-size: 24px;
            color: var(--slate-300);
            margin-left: 4px;
        }

        .metric__threshold {
            font-size: var(--text-sm);
            color: var(--slate-400);
            margin-bottom: var(--space-3);
        }

        .metric--critical .metric__threshold {
            color: var(--critical-text);
            font-weight: 600;
        }

        .metric__footer {
            border-top: 1px solid var(--ocean-700);
            padding-top: var(--space-3);
        }

        .metric__source {
            font-size: var(--text-xs);
            color: var(--slate-400);
            margin-bottom: var(--space-2);
        }

        .metric__timestamp {
            font-size: var(--text-xs);
            color: var(--slate-400);
        }

        /* BADGES RÈGLE DE VÉRITÉ */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 2px solid;
        }

        .badge--measured {
            background: var(--success-dark);
            color: #ffffff;
            border-color: var(--success);
        }

        .badge--inferred {
            background: var(--warning-dark);
            color: #ffffff;
            border-color: var(--warning);
        }

        .badge--simulated {
            background: #1f2937;
            color: #ffffff;
            border-color: #9ca3af;
        }

        .badge__icon {
            width: 12px;
            height: 12px;
        }

        /* LOADING STATE */
        .metric--loading {
            opacity: 0.6;
        }

        .metric--loading .metric__value {
            background: linear-gradient(90deg, var(--ocean-700) 25%, var(--ocean-800) 50%, var(--ocean-700) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            color: transparent;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ERROR STATE */
        .metric--error {
            border-left-color: var(--critical);
        }

        .metric__error {
            text-align: center;
            padding: var(--space-4) 0;
        }

        .metric__error-icon {
            font-size: var(--text-2xl);
            margin-bottom: var(--space-2);
        }

        .metric__error-text {
            font-size: var(--text-sm);
            color: var(--slate-400);
            margin-bottom: var(--space-3);
        }

        .metric__retry {
            padding: 8px 16px;
            background: var(--ocean-800);
            border: 2px solid var(--ocean-700);
            border-radius: 8px;
            color: var(--slate-100);
            font-size: var(--text-sm);
            cursor: pointer;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: rgba(0, 26, 46, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--ocean-700);
            padding-bottom: var(--safe-bottom);
        }

        .bottom-nav__list {
            display: flex;
            justify-content: space-around;
            list-style: none;
        }

        .bottom-nav__link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            text-decoration: none;
            color: var(--slate-400);
            font-size: var(--text-xs);
            gap: 4px;
        }

        .bottom-nav__link--active {
            color: var(--slate-100);
        }

        .bottom-nav__icon {
            font-size: var(--text-xl);
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: var(--space-8) var(--space-4);
            color: var(--slate-400);
        }

        .empty__icon {
            font-size: 48px;
            margin-bottom: var(--space-4);
        }

        .empty__text {
            font-size: var(--text-base);
        }
    </style>
</head>
